name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Dockerfile (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          ignore: DL3008

      - name: Lint shell scripts (shellcheck)
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: scripts
          severity: warning

  build:
    name: Build
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image and export as tarball
        uses: docker/build-push-action@v6
        with:
          context: .
          tags: bastionbrowser:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/bastionbrowser.tar

      - name: Upload image tarball
        uses: actions/upload-artifact@v4
        with:
          name: container-image
          path: /tmp/bastionbrowser.tar
          retention-days: 1

  scan:
    name: Vulnerability scan (Grype)
    needs: build
    runs-on: ubuntu-latest
    # Isolated job: no registry credentials, no push access.
    # Grype/Syft run only here and cannot affect the build artifact.
    permissions:
      security-events: write  # upload SARIF to GitHub Security tab
      actions: read           # required by anchore/scan-action for workflow metadata
      contents: read
    steps:
      # Required by github/codeql-action/upload-sarif to resolve git context.
      - uses: actions/checkout@v4

      - name: Download image tarball
        # v4.1.8+ fixes GHSA-cxww-7g56-2vh6 (arbitrary file write via extraction)
        uses: actions/download-artifact@v4.1.8
        with:
          name: container-image
          path: /tmp

      - name: Scan with Grype
        id: grype
        uses: anchore/scan-action@v6
        with:
          image: /tmp/bastionbrowser.tar
          fail-build: true
          only-fixed: true
          output-format: sarif

      - name: Upload scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}
