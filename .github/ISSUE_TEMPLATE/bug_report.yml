name: Bug report
description: Something is not working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Please fill in as much detail as possible. Logs from `docker logs <container>` are especially helpful.

  - type: input
    id: image_version
    attributes:
      label: Image version
      description: Output of `docker inspect --format '{{.Config.Image}}' <container>` or the tag you used.
      placeholder: "ghcr.io/shikucorp/bastionbrowser:v1.0.0"
    validations:
      required: true

  - type: input
    id: rdp_client
    attributes:
      label: RDP client
      description: Client software connecting to the container (e.g. Apache Guacamole 1.6, JumpServer, FreeRDP 2.x, mstsc).
      placeholder: "FreeRDP 2.11.7"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run container with `docker run ...`
        2. Connect via your RDP client / bastion with AlternateShell set to ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: run_command
    attributes:
      label: docker run command
      description: The exact command used to start the container (redact passwords).
      render: shell
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Container logs
      description: Output of `docker logs <container>`.
      render: text
