name: Feature request
description: Suggest a new environment variable, policy, or behaviour
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What use case is currently not supported?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the behaviour you'd like, including any new env vars or Chromium policy changes.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you considered, or workarounds you currently use.
